name: Daily build and push to Docker Hub

on:
  push:
    branches:
      - main              # cambia in master se il branch principale è master
  schedule:
    - cron: '0 3 * * *'   # ogni giorno alle 03:00 UTC (04:00 in Italia in inverno)
  workflow_dispatch: {}    # permette di avviarlo a mano dalla tab "Actions"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile          # cambia se il Dockerfile NON è nella root
          push: true
          tags: |
            lorezno0010/mammamia:latest
